services:
  # ===== BACKEND =====
  - type: web
    name: kimetsu-todo-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kimetsu-todo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://kimetsu-todo-frontend.onrender.com
      - key: PORT
        value: 10000

  # ===== FRONTEND =====
  - type: web
    name: kimetsu-todo-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://kimetsu-todo-backend.onrender.com
      - key: NODE_ENV
        value: production

# ===== DATABASE =====
databases:
  - name: kimetsu-todo-db
    plan: free

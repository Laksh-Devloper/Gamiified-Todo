services:
  - type: web
    name: kimetsu-todo-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kimetsu-todo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://kimetsu-todo-frontend.onrender.com

  - type: web
    name: kimetsu-todo-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://kimetsu-todo-backend.onrender.com

databases:
  - name: kimetsu-todo-db
    plan: free
